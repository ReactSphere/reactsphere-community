name: Update Org-Wide Contributors

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # every Sunday at midnight

jobs:
  contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      actions: read

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Fetch all org repos
        id: repos
        run: |
          ORG="ReactSphere" # replace with your org
          echo "Fetching repos for $ORG"
          REPOS=$(gh repo list $ORG --limit 100 --json name -q '.[].name')
          echo "repos=$REPOS" >> $GITHUB_OUTPUT

      - name: Collect merged PR authors
        id: authors
        run: |
          ORG="ReactSphere"
          AUTHORS=""
          for REPO in ${{ steps.repos.outputs.repos }}; do
            PRS=$(gh pr list --repo $ORG/$REPO --state merged --json author -q '.[].author.login')
            for USER in $PRS; do
              if [[ "$AUTHORS" != *"$USER"* ]]; then
                AUTHORS="$AUTHORS $USER"
              fi
            done
          done
          echo "authors=$AUTHORS" >> $GITHUB_OUTPUT

      - name: Generate CONTRIBUTORS.md
        run: |
          echo "# Contributors" > CONTRIBUTORS.md
          for USER in ${{ steps.authors.outputs.authors }}; do
            echo "- @$USER" >> CONTRIBUTORS.md
          done

      - name: Commit CONTRIBUTORS.md
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          git commit -m "chore: update org-wide CONTRIBUTORS.md" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
